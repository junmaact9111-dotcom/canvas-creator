<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>给嘉宝的话</title>
  <style>
    :root {
      --bg: #f7f2eb;
      --paper: rgba(255, 255, 255, 0.92);
      --text: #5a4d45;
      --subtext: #8a7b72;
      --accent: #d59d8c;
      --accent-dark: #bf806d;
      --shadow: 0 18px 40px rgba(102, 78, 64, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, #fff8f2 0%, #f8eee4 38%, #f3e7dc 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.65), transparent 25%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.45), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.35), transparent 28%);
      pointer-events: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(24px) scale(0.985);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .card {
      width: min(100%, 780px);
      height: min(720px, calc(100vh - 44px));
      max-height: calc(100vh - 44px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(5px);
    }

    .cover {
      background:
        linear-gradient(180deg, rgba(255, 248, 240, 0.94), rgba(251, 243, 236, 0.88)),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.7), transparent 35%);
      padding: 24px 24px 20px;
      justify-content: space-between;
    }

    .cover-top {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .title-badge {
      align-self: center;
      font-size: 12px;
      color: var(--subtext);
      letter-spacing: 0.18em;
      padding: 8px 14px;
      background: rgba(255,255,255,0.65);
      border-radius: 999px;
      border: 1px solid rgba(213, 157, 140, 0.25);
      margin-top: 4px;
    }

    .cats-wrap {
      flex: 1;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background:
        linear-gradient(180deg, #fff6ed 0%, #ffeede 100%);
      border: 1px solid rgba(214, 176, 150, 0.18);
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.75);
      border-radius: 999px;
      filter: blur(0.5px);
      animation: floatSpark 4s infinite ease-in-out;
    }

    .spark:nth-child(1) { top: 20%; left: 18%; animation-delay: 0.3s; }
    .spark:nth-child(2) { top: 28%; right: 18%; animation-delay: 1.4s; }
    .spark:nth-child(3) { bottom: 18%; left: 25%; animation-delay: 2.2s; }
    .spark:nth-child(4) { bottom: 30%; right: 28%; animation-delay: 0.9s; }

    @keyframes floatSpark {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.45; }
      50% { transform: translateY(-12px) scale(1.15); opacity: 0.9; }
    }

    .cover-cats {
      position: relative;
      width: 320px;
      height: 220px;
    }

    .cat {
      position: absolute;
      width: 122px;
      height: 122px;
      animation: bob 2.6s infinite ease-in-out;
      filter: drop-shadow(0 14px 12px rgba(137, 107, 90, 0.1));
    }

    .cat.right { animation-delay: 1.1s; }

    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    .cat .head {
      position: absolute;
      inset: 0;
      border-radius: 52% 52% 48% 48%;
      border: 2px solid rgba(107, 88, 75, 0.22);
      overflow: hidden;
    }

    .cat.gold .head { background: #efc996; }
    .cat.silver .head { background: #dfe1e6; }

    .ear {
      position: absolute;
      top: -18px;
      width: 40px;
      height: 42px;
      border-radius: 10px 90% 10px 70%;
      transform: rotate(-18deg);
      border: 2px solid rgba(107, 88, 75, 0.22);
    }

    .cat.gold .ear { background: #efc996; }
    .cat.silver .ear { background: #dfe1e6; }

    .ear.left { left: 10px; }
    .ear.right {
      right: 10px;
      transform: scaleX(-1) rotate(-18deg);
    }

    .ear::after {
      content: "";
      position: absolute;
      inset: 8px 10px 8px 10px;
      border-radius: 10px 90% 10px 70%;
      background: rgba(255, 209, 214, 0.6);
    }

    .face {
      position: absolute;
      inset: 0;
    }

    .eye {
      position: absolute;
      top: 48px;
      width: 10px;
      height: 14px;
      background: #5d4d43;
      border-radius: 50%;
    }

    .eye.left { left: 36px; }
    .eye.right { right: 36px; }

    .blush {
      position: absolute;
      top: 62px;
      width: 18px;
      height: 10px;
      background: rgba(255, 156, 156, 0.28);
      border-radius: 999px;
      filter: blur(1px);
    }

    .blush.left { left: 18px; }
    .blush.right { right: 18px; }

    .nose {
      position: absolute;
      left: 50%;
      top: 62px;
      width: 12px;
      height: 9px;
      background: #e89a94;
      transform: translateX(-50%);
      border-radius: 50% 50% 60% 60%;
    }

    .mouth {
      position: absolute;
      left: 50%;
      top: 71px;
      width: 24px;
      height: 14px;
      transform: translateX(-50%);
    }

    .mouth::before,
    .mouth::after {
      content: "";
      position: absolute;
      top: 0;
      width: 12px;
      height: 10px;
      border-bottom: 2px solid #7a6256;
      border-radius: 0 0 12px 12px;
    }

    .mouth::before { left: 0; transform: rotate(10deg); }
    .mouth::after { right: 0; transform: scaleX(-1) rotate(10deg); }

    .paw {
      position: absolute;
      bottom: -10px;
      width: 28px;
      height: 36px;
      border-radius: 18px;
      border: 2px solid rgba(107, 88, 75, 0.16);
      background: inherit;
    }

    .cat.gold .paw { background: #efc996; }
    .cat.silver .paw { background: #dfe1e6; }

    .paw.left { left: 28px; }
    .paw.right { right: 28px; }

    .tail {
      position: absolute;
      width: 90px;
      height: 24px;
      border-radius: 20px;
      border: 2px solid rgba(107, 88, 75, 0.16);
      z-index: -1;
    }

    .cat.gold .tail { background: #efc996; }
    .cat.silver .tail { background: #dfe1e6; }

    .cover-cats .cat.gold {
      left: 32px;
      top: 62px;
      transform: rotate(-10deg);
    }

    .cover-cats .cat.gold .tail {
      left: -58px;
      top: 76px;
      transform: rotate(-18deg);
    }

    .cover-cats .cat.silver {
      right: 36px;
      top: 24px;
      transform: rotate(12deg);
    }

    .cover-cats .cat.silver .tail {
      right: -54px;
      top: 74px;
      transform: rotate(26deg);
    }

    .cover-copy {
      background: rgba(255,255,255,0.62);
      border-radius: 20px;
      padding: 18px 18px;
      border: 1px solid rgba(213, 157, 140, 0.18);
      line-height: 1.8;
      font-size: 16px;
      color: var(--text);
      flex-shrink: 0;
    }

    .cover-copy p {
      margin: 0 0 12px;
    }

    .cover-copy p:last-child {
      margin-bottom: 0;
    }

    .paper {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.9)),
        repeating-linear-gradient(
          0deg,
          rgba(220, 206, 194, 0.07) 0px,
          rgba(220, 206, 194, 0.07) 1px,
          transparent 1px,
          transparent 28px
        );
      padding: 26px 20px 20px;
      justify-content: space-between;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 28%),
        radial-gradient(circle at bottom right, rgba(243, 219, 203, 0.18), transparent 30%);
      pointer-events: none;
    }

    .paper-head {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      z-index: 1;
    }

    .page-no {
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--subtext);
      text-transform: uppercase;
    }

    .show-all-btn {
      border: 0;
      background: rgba(213, 157, 140, 0.12);
      color: var(--accent-dark);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .show-all-btn:active {
      transform: scale(0.98);
      background: rgba(213, 157, 140, 0.2);
    }

    .typewriter {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px 8px 10px 8px;
      font-size: 18px;
      line-height: 2.02;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      scrollbar-width: none;
    }

    .typewriter::-webkit-scrollbar { display: none; }

    .cursor {
      display: inline-block;
      width: 10px;
      margin-left: 2px;
      color: var(--accent-dark);
      animation: blink 0.95s infinite;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    .bottom-actions {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      padding-top: 12px;
      padding-bottom: max(2px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .main-btn {
      border: 0;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      color: #fffdfb;
      font-size: 16px;
      padding: 15px 28px;
      min-width: 220px;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(191, 128, 109, 0.28);
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.2s ease;
    }

    .main-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .main-btn:not(:disabled):active {
      transform: scale(0.985);
      box-shadow: 0 9px 18px rgba(191, 128, 109, 0.2);
    }

    .ending {
      overflow: hidden;
      background:
        radial-gradient(circle at top, #fef4e9 0%, #f7eade 36%, #e8d8cf 70%, #d9c7c0 100%);
      align-items: center;
      justify-content: center;
    }

    .ending::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(59, 45, 39, 0.06);
      animation: dimIn 0.8s ease forwards;
    }

    @keyframes dimIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .ending-scene {
      position: relative;
      width: min(100%, 760px);
      height: min(100%, 760px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .moon {
      position: absolute;
      top: 9%;
      right: 14%;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fffdf4, #f4e7c5 68%, #ecd9aa 100%);
      box-shadow: 0 0 34px rgba(255, 245, 214, 0.65);
      opacity: 0.92;
    }

    .star {
      position: absolute;
      width: 5px;
      height: 5px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      animation: twinkle 2.8s infinite ease-in-out;
      z-index: 0;
    }

    .star:nth-child(2) { top: 14%; left: 18%; animation-delay: 0.4s; }
    .star:nth-child(3) { top: 24%; left: 32%; animation-delay: 1.6s; }
    .star:nth-child(4) { top: 20%; right: 26%; animation-delay: 0.8s; }
    .star:nth-child(5) { top: 32%; right: 18%; animation-delay: 2.1s; }
    .star:nth-child(6) { top: 38%; left: 12%; animation-delay: 1.2s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.45); }
    }

    .sleep-wrap {
      position: relative;
      width: 320px;
      height: 240px;
      filter: drop-shadow(0 26px 24px rgba(85, 58, 42, 0.16));
      animation: fadeRise 1.2s ease both;
    }

    @keyframes fadeRise {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .bed-shadow {
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 240px;
      height: 30px;
      background: rgba(120, 88, 69, 0.16);
      filter: blur(10px);
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .sleep-cat {
      position: absolute;
      width: 150px;
      height: 110px;
      border-radius: 55% 50% 48% 60%;
      border: 2px solid rgba(107, 88, 75, 0.18);
      animation: breathe 3.2s infinite ease-in-out;
      transform-origin: center bottom;
    }

    .sleep-cat.gold {
      background: #efc996;
      left: 38px;
      bottom: 46px;
      transform: rotate(8deg);
    }

    .sleep-cat.silver {
      background: #dfe1e6;
      right: 34px;
      bottom: 54px;
      transform: rotate(-10deg);
      animation-delay: 0.8s;
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scaleY(1) rotate(var(--rot)); }
      50% { transform: translateY(-2px) scaleY(1.03) rotate(var(--rot)); }
    }

    .sleep-cat.gold { --rot: 8deg; }
    .sleep-cat.silver { --rot: -10deg; }

    .sleep-head {
      position: absolute;
      width: 76px;
      height: 70px;
      border-radius: 55% 55% 45% 45%;
      border: 2px solid rgba(107, 88, 75, 0.18);
      top: -24px;
      left: 16px;
      background: inherit;
    }

    .sleep-cat.silver .sleep-head {
      left: auto;
      right: 14px;
    }

    .sleep-ear {
      position: absolute;
      top: -14px;
      width: 26px;
      height: 28px;
      border-radius: 10px 90% 10px 70%;
      border: 2px solid rgba(107, 88, 75, 0.18);
      background: inherit;
    }

    .sleep-ear.left { left: 5px; }
    .sleep-ear.right { right: 5px; transform: scaleX(-1); }

    .sleep-ear::after {
      content: "";
      position: absolute;
      inset: 6px;
      background: rgba(255, 209, 214, 0.55);
      border-radius: 10px 90% 10px 70%;
    }

    .sleep-face {
      position: absolute;
      inset: 0;
    }

    .sleep-eye {
      position: absolute;
      top: 26px;
      width: 14px;
      height: 8px;
      border-bottom: 2px solid #765f55;
      border-radius: 0 0 14px 14px;
    }

    .sleep-eye.left { left: 16px; }
    .sleep-eye.right { right: 16px; }

    .sleep-nose {
      position: absolute;
      left: 50%;
      top: 34px;
      width: 10px;
      height: 8px;
      background: #e89a94;
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .sleep-tail {
      position: absolute;
      width: 104px;
      height: 24px;
      border-radius: 20px;
      background: inherit;
      border: 2px solid rgba(107, 88, 75, 0.14);
    }

    .sleep-cat.gold .sleep-tail {
      right: -52px;
      bottom: 22px;
      transform: rotate(24deg);
    }

    .sleep-cat.silver .sleep-tail {
      left: -50px;
      bottom: 20px;
      transform: rotate(-18deg);
    }

    .ending-text {
      position: absolute;
      bottom: 16%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      letter-spacing: 0.04em;
      color: #fffaf5;
      text-shadow: 0 6px 18px rgba(95, 72, 59, 0.3);
      opacity: 0;
      animation: fadeText 1.4s ease 0.9s forwards;
      white-space: nowrap;
    }

    @keyframes fadeText {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .hint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.68);
      opacity: 0;
      animation: fadeText 1.2s ease 1.8s forwards;
    }

    @media (max-width: 768px) {
      .card {
        height: calc(100vh - 32px);
        max-height: calc(100vh - 32px);
        border-radius: 24px;
      }

      .cover-copy,
      .typewriter {
        font-size: 16px;
      }

      .main-btn {
        width: 100%;
        min-width: 0;
      }

      .sleep-wrap {
        transform: scale(0.92);
      }

      .ending-text {
        font-size: 22px;
      }
    }

      .cover-copy,
      .typewriter {
        font-size: 16px;
      }

      .main-btn {
        width: 100%;
        min-width: 0;
      }

      .sleep-wrap {
        transform: scale(0.92);
      }

      .ending-text {
        font-size: 22px;
      }
    }

    @media (max-width: 430px) {
      .page { padding: 12px; }
      .card {
        height: calc(100vh - 24px);
        max-height: calc(100vh - 24px);
      }
      .cover, .paper { padding-left: 14px; padding-right: 14px; }
      .cover { padding-top: 16px; padding-bottom: 14px; }
      .cover-top { gap: 12px; }
      .cover-cats { width: 240px; height: 170px; }
      .cats-wrap { min-height: 150px; }
      .cover-copy, .typewriter { font-size: 14px; line-height: 1.8; }
      .cover-copy { padding: 14px; }
      .typewriter { padding-left: 2px; padding-right: 2px; }
      .title-badge { font-size: 10px; padding: 6px 10px; }
      .main-btn { padding: 13px 18px; font-size: 15px; }
      .ending-text { bottom: 14%; font-size: 20px; }
      .hint { font-size: 11px; }
    }
      .cover, .paper { padding-left: 16px; padding-right: 16px; }
      .cover-cats { width: 280px; height: 210px; }
      .cover-copy, .typewriter { font-size: 15px; line-height: 1.95; }
      .typewriter { padding-left: 2px; padding-right: 2px; }
      .title-badge { font-size: 11px; }
      .ending-text { bottom: 14%; font-size: 20px; }
      .hint { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="page active" data-page="0">
      <div class="card cover">
        <div class="cover-top">
          <div class="title-badge">给嘉宝的一封小小电子信</div>
          <div class="cats-wrap">
            <span class="spark"></span>
            <span class="spark"></span>
            <span class="spark"></span>
            <span class="spark"></span>

            <div class="cover-cats">
              <div class="cat gold">
                <div class="tail"></div>
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="head">
                  <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="nose"></div>
                    <div class="mouth"></div>
                  </div>
                </div>
                <div class="paw left"></div>
                <div class="paw right"></div>
              </div>

              <div class="cat silver right">
                <div class="tail"></div>
                <div class="ear left"></div>
                <div class="ear right"></div>
                <div class="head">
                  <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="blush left"></div>
                    <div class="blush right"></div>
                    <div class="nose"></div>
                    <div class="mouth"></div>
                  </div>
                </div>
                <div class="paw left"></div>
                <div class="paw right"></div>
              </div>
            </div>
          </div>

          <div class="cover-copy">
            <p>Hi 嘉宝，</p>
            <p>我猜你现在可能不太想跟我聊这些，<br>所以我换了一种方式，把这些话慢慢写给你。</p>
            <p>分开后的这段时间，我想了很多，<br>也有一些话，一直想好好说给你听。</p>
          </div>
        </div>

        <div class="bottom-actions">
          <button class="main-btn next-btn" data-next="1">那我看看你想说什么</button>
        </div>
      </div>
    </section>

    <section class="page" data-page="1">
      <div class="card paper">
        <div class="paper-head">
          <div class="page-no">PAGE 1 / 3</div>
          <button class="show-all-btn" data-target="1">直接显示本页全文</button>
        </div>
        <div class="typewriter" id="typewriter-1"></div>
        <div class="bottom-actions">
          <button class="main-btn next-btn" data-next="2" disabled>嗯…继续说</button>
        </div>
      </div>
    </section>

    <section class="page" data-page="2">
      <div class="card paper">
        <div class="paper-head">
          <div class="page-no">PAGE 2 / 3</div>
          <button class="show-all-btn" data-target="2">直接显示本页全文</button>
        </div>
        <div class="typewriter" id="typewriter-2"></div>
        <div class="bottom-actions">
          <button class="main-btn next-btn" data-next="3" disabled>那现在呢</button>
        </div>
      </div>
    </section>

    <section class="page" data-page="3">
      <div class="card paper">
        <div class="paper-head">
          <div class="page-no">PAGE 3 / 3</div>
          <button class="show-all-btn" data-target="3">直接显示本页全文</button>
        </div>
        <div class="typewriter" id="typewriter-3"></div>
        <div class="bottom-actions">
          <button class="main-btn next-btn" data-next="4" disabled>我看完了</button>
        </div>
      </div>
    </section>

    <section class="page" data-page="4">
      <div class="card ending">
        <div class="ending-scene">
          <div class="star"></div>
          <div class="star"></div>
          <div class="star"></div>
          <div class="star"></div>
          <div class="star"></div>
          <div class="moon"></div>

          <div class="sleep-wrap">
            <div class="bed-shadow"></div>

            <div class="sleep-cat gold">
              <div class="sleep-head">
                <div class="sleep-ear left"></div>
                <div class="sleep-ear right"></div>
                <div class="sleep-face">
                  <div class="sleep-eye left"></div>
                  <div class="sleep-eye right"></div>
                  <div class="sleep-nose"></div>
                </div>
              </div>
              <div class="sleep-tail"></div>
            </div>

            <div class="sleep-cat silver">
              <div class="sleep-head">
                <div class="sleep-ear left"></div>
                <div class="sleep-ear right"></div>
                <div class="sleep-face">
                  <div class="sleep-eye left"></div>
                  <div class="sleep-eye right"></div>
                  <div class="sleep-nose"></div>
                </div>
              </div>
              <div class="sleep-tail"></div>
            </div>
          </div>

          <div class="ending-text">谢谢你看到这里。</div>
          <div class="hint">把想说的话，好好说完了。</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const pages = Array.from(document.querySelectorAll('.page'));
    const nextButtons = document.querySelectorAll('.next-btn');
    const showAllButtons = document.querySelectorAll('.show-all-btn');

    const texts = {
      1: `之前那段时间，你在工作上真的很辛苦。\n会焦虑、失眠、掉眼泪……\n\n可是我没有接住你。\n没有好好安慰你，也没有给你你需要的那种陪伴。\n\n对不起。\n\n后来我反复在想那段时间。\n每次视频看到你那么难受，其实我是真的心疼。\n\n但我做错了一件事。\n\n我总是想“解决问题”，\n想把你从那些困住你的事情里拉出来。\n\n可你那时候需要的，\n可能只是——\n有人站在你这边，陪你一起难受，甚至一起吐槽。\n\n而不是被分析、被建议。\n\n我们就在这样的错位里，慢慢开始误会彼此。\n\n你觉得我不理解你，\n我却以为自己已经很努力在帮你。\n\n慢慢地，我们都累了。\n也慢慢地，走远了。`,
      2: `你以前说过，我的职业规划有点随性，不太落地。\n\n那时候我其实有点不服，也有点嘴硬。\n\n现在回头看，\n我开始慢慢理解你当时的担心了。\n\n回国这半年，我的状态也在一点点调整。\n\n前阵子参与的项目拿了公司奖，\n那种把事情一步步做成的感觉，让我很踏实。\n\n我开始更认真地去对待工作、对待未来。\n\n不再只是想“以后要怎样”，\n而是先把眼前的事情做好。\n\n也在慢慢积累经验、能力，还有一点点底气。\n\n关于未来，我还是会焦虑。\n\n但现在的我，会选择在确定的事情里一点点往前走。\n\n这些变化，不是为了证明什么。\n\n只是想让你知道，\n我开始懂你当时在担心什么了。`,
      3: `这四年，其实我们早就不只是简单的快乐了。\n\n也有情绪、误会、还有我很多没有处理好的地方。\n\n我以前总是把情绪写在脸上，\n以为不说出来，事情就过去了。\n\n但现在才明白，\n那些没说出口的东西，其实都留在了你那里。\n\n变成了你的委屈。\n\n分开后的这段时间，我过得并不好。\n\n但也正因为这样，我才慢慢看清了很多事情。\n\n我还是在意你。\n\n也开始认真地想，如果还有机会，\n我应该怎么去好好对待一个人。\n\n如果你还没有把我完全关在门外，\n我希望未来有一天，我们还能再好好聊一聊。\n\n当然，如果你现在只想过好自己的生活，\n我也会尊重你的选择。\n\n这些话，我只是想认真地告诉你。`
    };

    const typewriterState = {
      1: { started: false, finished: false, timer: null },
      2: { started: false, finished: false, timer: null },
      3: { started: false, finished: false, timer: null }
    };

    function showPage(index) {
      pages.forEach((page, i) => {
        page.classList.toggle('active', i === index);
      });

      if (texts[index] && !typewriterState[index].started) {
        startTypewriter(index);
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function getDelay(char, nextChar) {
      if (char === '\n') return 180;
      if ('，、'.includes(char)) return 90;
      if ('。！？；'.includes(char)) return 280;
      if ('…'.includes(char)) return 180;
      if (char === ' ') return 35;
      if (nextChar === '\n') return 80;
      return 38 + Math.random() * 22;
    }

    function renderText(target, content, showCursor = true) {
      const html = escapeHtml(content).replace(/\n/g, '<br>');
      target.innerHTML = html + (showCursor ? '<span class="cursor">|</span>' : '');
      target.scrollTop = target.scrollHeight;
    }

    function finishTypewriter(pageId) {
      const state = typewriterState[pageId];
      const target = document.getElementById(`typewriter-${pageId}`);
      const btn = document.querySelector(`.next-btn[data-next="${pageId + 1}"]`);
      const showAllBtn = document.querySelector(`.show-all-btn[data-target="${pageId}"]`);

      clearTimeout(state.timer);
      state.finished = true;
      renderText(target, texts[pageId], false);
      btn.disabled = false;
      showAllBtn.style.display = 'none';
    }

    function startTypewriter(pageId) {
      const state = typewriterState[pageId];
      const target = document.getElementById(`typewriter-${pageId}`);
      const showAllBtn = document.querySelector(`.show-all-btn[data-target="${pageId}"]`);
      const text = texts[pageId];
      let index = 0;
      let buffer = '';

      state.started = true;
      target.innerHTML = '';

      function type() {
        if (state.finished) return;

        if (index >= text.length) {
          finishTypewriter(pageId);
          return;
        }

        buffer += text[index];
        renderText(target, buffer, true);

        const currentChar = text[index];
        const nextChar = text[index + 1] || '';
        index += 1;
        state.timer = setTimeout(type, getDelay(currentChar, nextChar));
      }

      showAllBtn.onclick = () => finishTypewriter(pageId);
      type();
    }

    nextButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const next = Number(button.dataset.next);
        showPage(next);
      });
    });

    showAllButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const target = Number(button.dataset.target);
        finishTypewriter(target);
      });
    });

    document.addEventListener('keydown', (e) => {
      const activeIndex = pages.findIndex(page => page.classList.contains('active'));
      if (activeIndex === -1) return;

      if (e.key === 'Enter' || e.key === ' ') {
        const activePage = pages[activeIndex];
        const button = activePage.querySelector('.main-btn:not(:disabled)');
        if (button) button.click();
      }
    });
  </script>
</body>
</html>
