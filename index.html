<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给嘉宝的话</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#f7f2eb; overflow-y:auto; }
    .page { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:.5s; padding:20px; box-sizing:border-box; }
    .page.active { opacity:1; pointer-events:auto; }
    .card { width:90%; max-width:600px; max-height:90vh; overflow-y:auto; background:white; border-radius:20px; padding:20px; text-align:center; box-sizing:border-box; }
    .cats { display:flex; justify-content:center; gap:20px; margin-bottom:20px; }
    .cats img { width:120px; height:120px; object-fit:cover; border-radius:20px; }
    .btn { margin-top:20px; padding:12px 20px; border:none; border-radius:999px; background:#d59d8c; color:#fff; cursor:pointer; }
    .type { text-align:left; white-space:pre-wrap; line-height:1.8; min-height:200px; }
    .ending img { width:140px; border-radius:20px; animation:breathe 3s infinite; }
    @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  </style>
</head>
<body>
<div id="app">

<!-- 第1页 -->
<div class="page active" data-page="0">
  <div class="card">
    <div class="cats">
      <img src="cat1.jpg" />
      <img src="cat2.jpg" />
    </div>
    <div>
Hi 嘉宝，

我猜你现在可能不太想跟我聊这些，
所以我换了一种方式，把这些话慢慢写给你。

分开后的这段时间，我想了很多，
也有一些话，一直想好好说给你听。
    </div>
    <button class="btn" onclick="next(1)">那我看看你想说什么</button>
  </div>
</div>

<!-- 第2页 -->
<div class="page" data-page="1">
  <div class="card">
    <div class="type" id="t1"></div>
    <button class="btn" id="b1" disabled onclick="next(2)">嗯…继续说</button>
  </div>
</div>

<!-- 第3页 -->
<div class="page" data-page="2">
  <div class="card">
    <div class="type" id="t2"></div>
    <button class="btn" id="b2" disabled onclick="next(3)">那现在呢</button>
  </div>
</div>

<!-- 第4页 -->
<div class="page" data-page="3">
  <div class="card">
    <div class="type" id="t3"></div>
    <button class="btn" id="b3" disabled onclick="next(4)">我看完了</button>
  </div>
</div>

<!-- 第5页 -->
<div class="page ending" data-page="4">
  <div class="card">
    <div class="cats">
      <img src="cat1.jpg" />
      <img src="cat2.jpg" />
    </div>
    <div style="margin-top:20px;font-size:20px;">谢谢你看到这里。</div>
  </div>
</div>

</div>

<script>
const texts=[
`之前那段时间，你在工作上真的很辛苦。
会焦虑、失眠、掉眼泪……

可是我没有接住你。
没有好好安慰你，也没有给你你需要的那种陪伴。

对不起。

后来我反复在想那段时间。
每次视频看到你那么难受，其实我是真的心疼。

但我做错了一件事。

我总是想“解决问题”，
想把你从那些困住你的事情里拉出来。

可你那时候需要的，
可能只是——
有人站在你这边，陪你一起难受，甚至一起吐槽。

而不是被分析、被建议。

我们就在这样的错位里，慢慢开始误会彼此。

你觉得我不理解你，
我却以为自己已经很努力在帮你。

慢慢地，我们都累了。
也慢慢地，走远了。`,

`你以前说过，我的职业规划有点随性，不太落地。

那时候我其实有点不服，也有点嘴硬。

现在回头看，
我开始慢慢理解你当时的担心了。

回国这半年，我的状态也在一点点调整。

前阵子参与的项目拿了公司奖，
那种把事情一步步做成的感觉，让我很踏实。

我开始更认真地去对待工作、对待未来。

不再只是想“以后要怎样”，
而是先把眼前的事情做好。

也在慢慢积累经验、能力，还有一点点底气。

关于未来，我还是会焦虑。

但现在的我，会选择在确定的事情里一点点往前走。

这些变化，不是为了证明什么。

只是想让你知道，
我开始懂你当时在担心什么了。`,

`这四年，其实我们早就不只是简单的快乐了。

也有情绪、误会、还有我很多没有处理好的地方。

我以前总是把情绪写在脸上，
让你感到压抑，难受。

我的情绪来得快，去得快，

但那些脸色，其实都留在了你那里。

变成了你的委屈。

分开后的这段时间，我才慢慢看清了很多事情。

我还是在意你，爱你。

也开始认真地想，如果还有机会，
我应该怎么去好好对待一个人。

如果你还没有把我完全关在门外，
我希望还有机会，我们能再好好聊一聊。

当然，如果你现在只想过好自己的生活，
我也会尊重你的选择。

这些话，我只是想认真地告诉你。`
];

function next(i){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.querySelector(`.page[data-page='${i}']`).classList.add('active');
 if(i>0&&i<4) type(i-1);
}

function type(i){
 const el=document.getElementById('t'+(i+1));
 const btn=document.getElementById('b'+(i+1));
 let t=texts[i]; let idx=0;
 el.innerText=''; btn.disabled=true;
 function run(){
  if(idx<t.length){
    el.innerText+=t[idx++];
    setTimeout(run,30);
  }else btn.disabled=false;
 }
 run();
}
</script>
</body>
</html>
